<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Budget Clémence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f1ec;--surface:#fff;--surface2:#faf8f5;--border:#e2dbd0;
  --text:#1e1a14;--text2:#6b6157;--text3:#a89e93;
  --accent:#c17f3a;--accent-light:#f5e9d8;--danger:#c0392b;
  --shadow:0 2px 16px rgba(0,0,0,.07);--shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --r:14px;--r-sm:9px;
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;overscroll-behavior:none;padding-bottom:var(--nav-h)}

/* TOPBAR */
.topbar{background:var(--text);color:#f4f1ec;padding:0 18px;display:flex;align-items:center;height:50px;position:sticky;top:0;z-index:100}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:18px;letter-spacing:1px}
.topbar-title span{color:var(--accent)}

/* NAV BAS */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--text);display:flex;align-items:center;justify-content:space-around;z-index:100;border-top:1px solid rgba(255,255,255,.08);padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 20px;border-radius:10px;transition:all .2s;color:#a89e93}
.bnav-btn .bnav-icon{font-size:22px;line-height:1}
.bnav-btn .bnav-label{font-size:10px;font-weight:500;letter-spacing:.5px;font-family:'DM Sans',sans-serif}
.bnav-btn.active{color:var(--accent)}
.bnav-btn.active .bnav-icon{transform:scale(1.1)}

.container{max-width:600px;margin:0 auto;padding:14px 14px}

/* LOADER */
.loader-overlay{position:fixed;inset:0;background:rgba(244,241,236,.95);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.loader-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* COCKPIT */
.cockpit{background:var(--text);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow-lg);color:#f4f1ec}
.cockpit-hero{margin-bottom:14px}
.cockpit-hero .ch-label{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#a89e93;margin-bottom:2px}
.cockpit-hero .ch-amount{font-family:'Cormorant Garamond',serif;font-size:46px;font-weight:700;color:var(--accent);line-height:1}
.cockpit-hero .ch-month{font-size:12px;color:#a89e93;margin-top:3px}
.cockpit-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cs-card{background:rgba(255,255,255,.06);border-radius:10px;padding:10px 12px}
.cs-card .cs-val{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#f4f1ec}
.cs-card .cs-lbl{font-size:10px;color:#a89e93;text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* MOIS NAV */
.month-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-bar button{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;color:var(--accent);font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.month-lbl{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600}

/* SAISIE */
.quick-entry{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.qe-cats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.qe-cat{padding:9px 4px;text-align:center;cursor:pointer;transition:background .15s;font-size:10px;font-weight:500;color:var(--text2);border-right:1px solid var(--border);line-height:1.3}
.qe-cat:last-child{border-right:none}
.qe-cat .qc-icon{font-size:16px;display:block;margin-bottom:2px}
.qe-cat.active{color:#fff;font-weight:600}

.qe-body{padding:14px}
.qe-poste-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:5px;font-weight:600}
.qe-postes{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.qe-poste-btn{padding:5px 11px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;white-space:nowrap}
.qe-poste-btn.active{color:#fff;border-color:transparent;font-weight:600}
.qe-poste-btn.recent::before{content:'★ ';font-size:9px;opacity:.7}

.qe-montant-row{display:flex;gap:9px;align-items:center;margin-bottom:9px}
.qe-montant-wrap{flex:1;position:relative}
.qe-montant-wrap input{width:100%;padding:13px 42px 13px 14px;border:2px solid var(--border);border-radius:var(--r-sm);font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--text);background:var(--surface2);outline:none;transition:border-color .2s;-webkit-appearance:none}
.qe-montant-wrap input:focus{border-color:var(--accent);background:#fff}
.qe-montant-wrap .euro{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--text3);font-family:'Cormorant Garamond',serif}
.btn-valider{background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);padding:13px 20px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 3px 12px rgba(193,127,58,.4);transition:all .15s}
.btn-valider:active{background:#a86830;transform:scale(.96)}
.btn-valider:disabled{background:var(--text3);box-shadow:none}

.qe-options-row{display:flex;align-items:center;gap:8px}
.btn-options{background:none;border:1px solid var(--border);border-radius:100px;padding:4px 11px;font-size:11px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-options.open{color:var(--accent);border-color:var(--accent)}
.qe-extra{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.qe-extra.show{display:block}
.qe-extra input{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--surface2);outline:none;margin-bottom:7px}
.qe-extra input:last-child{margin-bottom:0}
.qe-extra input:focus{border-color:var(--accent)}

/* CARTES CATS */
.cat-cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.cat-card{background:var(--surface);border-radius:var(--r);padding:12px 13px;box-shadow:var(--shadow);border-left:3px solid;cursor:pointer;transition:transform .15s,box-shadow .15s}
.cat-card:active{transform:scale(.97)}
.cat-card .cc-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.cat-card .cc-amount{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700}
.cat-card .cc-moy{font-size:10px;color:var(--text3);margin-top:2px}
.cat-card .cc-bar{height:3px;background:var(--border);border-radius:2px;margin-top:7px;overflow:hidden}
.cat-card .cc-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.cat-card .cc-state{font-size:10px;margin-top:3px;font-weight:500}

/* LISTE */
.dep-section{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.dep-section-hdr{display:flex;justify-content:space-between;align-items:center;padding:9px 15px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#fff}
.dep-section-hdr .hdr-total{font-size:14px;font-weight:700}
.dep-item{display:flex;align-items:center;padding:9px 15px;border-bottom:1px solid var(--border);gap:9px;transition:background .15s}
.dep-item:last-child{border-bottom:none}
.dep-item:active{background:var(--surface2)}
.dep-item-info{flex:1;min-width:0}
.dep-item-poste{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dep-item-meta{font-size:11px;color:var(--text3);margin-top:1px}
.dep-item-amount{font-weight:700;font-size:14px;white-space:nowrap}
.dep-item-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:4px;border-radius:6px;flex-shrink:0}
.dep-item-del:active{color:var(--danger)}

/* RECAP TABLES */
.section-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;margin-bottom:3px}
.section-sub{color:var(--text2);font-size:12px;margin-bottom:16px}
.recap-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.recap-tab{padding:6px 14px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .2s}
.recap-tab.active{background:var(--text);color:var(--accent);border-color:var(--text)}
.recap-table{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:auto;box-shadow:var(--shadow);margin-bottom:14px}
.recap-table table{width:100%;border-collapse:collapse}
.recap-table th{background:var(--text);color:#f4f1ec;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;white-space:nowrap}
.recap-table th:first-child{text-align:left;min-width:150px;position:sticky;left:0;z-index:2}
.recap-table td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border);font-size:12px;white-space:nowrap}
.recap-table td:first-child{text-align:left;font-weight:500;position:sticky;left:0;background:var(--surface);z-index:1;border-right:1px solid var(--border)}
.recap-table tr:hover td{background:var(--surface2)}
.recap-table tr:hover td:first-child{background:var(--surface2)}
.recap-table .cat-row td{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;color:#fff}
.recap-table .total-row td{background:var(--text)!important;color:var(--accent)!important;font-weight:700;font-size:12px}
.zero{color:var(--text3)!important}
.cur{background:var(--accent-light)!important;font-weight:600}

/* ANNÉE */
.year-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.year-sel{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 13px;box-shadow:var(--shadow)}
.year-sel button{background:none;border:none;cursor:pointer;color:var(--accent);font-size:20px;padding:0 3px}
.year-lbl{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--accent);min-width:60px;text-align:center}
.cmp-btn{padding:7px 13px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .2s;box-shadow:var(--shadow)}
.cmp-btn.active{background:var(--text);color:var(--accent);border-color:var(--text)}
.year-cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.year-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;box-shadow:var(--shadow);border-top:3px solid}
.yc-cat{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:3px}
.yc-amount{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700}
.yc-moy{font-size:10px;color:var(--text3);margin-top:2px}
.yc-cmp{font-size:11px;margin-top:5px;padding-top:5px;border-top:1px solid var(--border)}
.up{color:#c0392b;font-weight:600}
.down{color:#27ae60;font-weight:600}
.eq{color:var(--text3)}

/* GLISSANT */
.glissant-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.glissant-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 13px;box-shadow:var(--shadow);border-top:3px solid}
.card-cat{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:3px}
.card-amount{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700}
.card-sub{font-size:10px;color:var(--text3);margin-top:2px}
.card-moy{font-size:11px;color:var(--text2);margin-top:5px;padding-top:5px;border-top:1px solid var(--border)}

.grand-total-card{background:var(--text);color:#f4f1ec;border-radius:var(--r);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-lg);margin-bottom:16px}
.gt-label{font-family:'Cormorant Garamond',serif;font-size:16px}
.gt-amount{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--accent)}

.toast{position:fixed;bottom:calc(var(--nav-h) + 10px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#f4f1ec;padding:9px 18px;border-radius:100px;font-size:13px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.page{display:none}
.page.active{display:block}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="loader-overlay" id="loader"><div class="loader-spinner"></div></div>
<div class="toast" id="toast"></div>

<!-- TOPBAR simple -->
<div class="topbar">
  <div class="topbar-title">Clémence <span>·</span> Budget</div>
</div>

<div class="container">

<!-- HOME -->
<div class="page active" id="page-home">

  <!-- COCKPIT 3 stats -->
  <div class="cockpit">
    <div class="cockpit-hero">
      <div class="ch-label">Ce mois</div>
      <div class="ch-amount" id="ck-mois">—</div>
      <div class="ch-month" id="ck-month-name"></div>
    </div>
    <div class="cockpit-stats">
      <div class="cs-card">
        <div class="cs-val" id="ck-moy">—</div>
        <div class="cs-lbl">Moyenne / mois</div>
      </div>
      <div class="cs-card">
        <div class="cs-val" id="ck-prev">—</div>
        <div class="cs-lbl" id="ck-prev-lbl">Mois précédent</div>
      </div>
    </div>
  </div>

  <!-- MOIS NAV -->
  <div class="month-bar">
    <button onclick="changeMonth(-1)">‹</button>
    <div class="month-lbl" id="month-lbl"></div>
    <button onclick="changeMonth(1)">›</button>
  </div>

  <!-- SAISIE RAPIDE -->
  <div class="quick-entry">
    <div class="qe-cats" id="qe-cats-1"></div>
    <div class="qe-cats" id="qe-cats-2"></div>
    <div class="qe-body">
      <div class="qe-poste-label">Poste</div>
      <div class="qe-postes" id="qe-postes"></div>
      <div class="qe-montant-row">
        <div class="qe-montant-wrap">
          <input type="number" id="f-montant" placeholder="0" min="0" step="0.01" inputmode="decimal">
          <span class="euro">€</span>
        </div>
        <button class="btn-valider" id="btn-valider" onclick="addDepense()">✓ OK</button>
      </div>
      <div class="qe-options-row">
        <button class="btn-options" id="btn-opts" onclick="toggleOpts()">+ options</button>
        <span style="font-size:11px;color:var(--text3)" id="f-date-display"></span>
      </div>
      <div class="qe-extra" id="qe-extra">
        <input type="text" id="f-note" placeholder="Note / commentaire…">
        <input type="date" id="f-date">
      </div>
    </div>
  </div>

  <!-- CARTES CATS -->
  <div class="cat-cards" id="cat-cards"></div>

  <!-- LISTE -->
  <div id="liste-depenses"></div>

</div>

<!-- RECAP -->
<div class="page" id="page-recap">
  <div class="section-title">Récapitulatif</div>
  <p class="section-sub">Tous les postes · tous les mois</p>
  <div class="recap-tabs">
    <button class="recap-tab active" onclick="showRecapView('cats',this)">Par catégorie</button>
    <button class="recap-tab" onclick="showRecapView('postes',this)">Par poste</button>
  </div>
  <div class="recap-table" id="recap-container"></div>
</div>

<!-- ANNÉE -->
<div class="page" id="page-annee">
  <div class="section-title">Vue par année</div>
  <p class="section-sub">Bilan · comparaison</p>
  <div class="year-nav">
    <div class="year-sel">
      <button onclick="changeYear(-1)">‹</button>
      <div class="year-lbl" id="year-lbl"></div>
      <button onclick="changeYear(1)">›</button>
    </div>
    <button class="cmp-btn" id="cmp-btn" onclick="toggleCompare()">⚖️ Comparer</button>
  </div>
  <div class="year-cards" id="year-cards"></div>
  <div class="grand-total-card" style="margin-bottom:14px">
    <div><div class="gt-label">Total annuel</div><div style="font-size:11px;color:#a89e93;margin-top:2px" id="year-total-sub"></div></div>
    <div class="gt-amount" id="year-total">0,00 €</div>
  </div>
  <div class="recap-tabs">
    <button class="recap-tab active" onclick="showAnneeView('cats',this)">Par catégorie</button>
    <button class="recap-tab" onclick="showAnneeView('postes',this)">Par poste</button>
  </div>
  <div class="recap-table" id="annee-table"></div>
</div>

<!-- GLISSANT -->
<div class="page" id="page-glissant">
  <div class="section-title">12 mois glissants</div>
  <p class="section-sub" id="glissant-period"></p>
  <div class="glissant-grid" id="glissant-grid"></div>
  <div class="grand-total-card" style="margin-bottom:14px">
    <div><div class="gt-label">Total 12 mois</div><div style="font-size:11px;color:#a89e93;margin-top:2px" id="glissant-moy-lbl"></div></div>
    <div class="gt-amount" id="glissant-total">0,00 €</div>
  </div>
  <div class="recap-table" id="glissant-table"></div>
</div>

</div>

<!-- NAV BAS -->
<nav class="bottom-nav">
  <button class="bnav-btn active" onclick="showPage('home',this)">
    <span class="bnav-icon">🏠</span>
    <span class="bnav-label">Accueil</span>
  </button>
  <button class="bnav-btn" onclick="showPage('recap',this)">
    <span class="bnav-icon">📊</span>
    <span class="bnav-label">Récap</span>
  </button>
  <button class="bnav-btn" onclick="showPage('annee',this)">
    <span class="bnav-icon">📅</span>
    <span class="bnav-label">Année</span>
  </button>
  <button class="bnav-btn" onclick="showPage('glissant',this)">
    <span class="bnav-icon">📈</span>
    <span class="bnav-label">12 mois</span>
  </button>
</nav>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzdEgi1Z5Lnfc6_SUIb9Rsq4jIB6He9c3nFcYdL9MFCRc6fV67Xir1pkbNcfUWgG0tn4Q/exec';

const CATS=[
  {id:'maison',   label:'Maison',    icon:'🏠',color:'#c17f3a',postes:['Taxe foncière','Assurance habitation','Entretien général','Réparations','Jardinage','Nettoyage','Mobilier','Décoration','Outillage','Petit électroménager']},
  {id:'energie',  label:'Énergie',   icon:'⚡',color:'#d4a017',postes:['Électricité','Eau','Gaz','Fioul','Bois / Pellets','Internet / Box','Téléphone fixe','Téléphone mobile']},
  {id:'alim',     label:'Courses',   icon:'🛒',color:'#5a8a5a',postes:['Supermarché','Marché / Primeur','Boulangerie','Restaurant','Café / Bar','Livraison repas','Cave / Boissons']},
  {id:'loisir',   label:'Loisirs',   icon:'🎉',color:'#3a7fa8',postes:['Streaming','Musique','Cinéma / Concert','Sport / Fitness','Vacances','Livres / Presse','Jeux','Hobbies','Sorties']},
  {id:'transport',label:'Transport', icon:'🚗',color:'#7a5aa8',postes:['Carburant','Assurance voiture','Contrôle technique','Réparation véhicule','Péages','Parking','Train / Avion','Vélo']},
  {id:'sante',    label:'Santé',     icon:'❤️',color:'#a85a5a',postes:['Médecin','Spécialiste','Pharmacie','Dentiste','Optique','Kiné','Mutuelle']},
  {id:'divers',   label:'Divers',    icon:'📦',color:'#7a7a7a',postes:['Coiffeur','Vêtements','Cosmétiques','Cadeaux','Animaux','Tabac','Autres']},
  {id:'epargne',  label:'Épargne',   icon:'🏦',color:'#2e7d9a',postes:['Livret A / LDDS','Assurance vie','PEA / Bourse','Plan Épargne Retraite','Épargne logement (PEL/CEL)','Impôt sur le revenu','Taxe d\'habitation','Autres placements']},
];

const MFR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

let curMonth=new Date().getMonth(),curYear=new Date().getFullYear();
let selYear=new Date().getFullYear(),compareMode=false,anneeView='cats',recapView='cats';
let selCat='alim',selPoste='';
let depenses=[],cbN=0,optsOpen=false;

function getRecents(id){try{return JSON.parse(localStorage.getItem('rec_'+id)||'[]')}catch{return[]}}
function addRecent(id,p){let r=getRecents(id).filter(x=>x!==p);r.unshift(p);localStorage.setItem('rec_'+id,JSON.stringify(r.slice(0,3)))}

function jsonp(p){
  return new Promise((res,rej)=>{
    const cb='cb_'+(++cbN)+'_'+Date.now();
    const t=setTimeout(()=>{delete window[cb];rej()},15000);
    window[cb]=d=>{clearTimeout(t);delete window[cb];res(d)};
    const qs=Object.entries({...p,callback:cb}).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    const s=document.createElement('script');s.src=SCRIPT_URL+'?'+qs;
    s.onerror=()=>{clearTimeout(t);delete window[cb];rej()};
    document.head.appendChild(s);
    setTimeout(()=>{if(s.parentNode)s.parentNode.removeChild(s)},16000);
  });
}

function toast(msg,d=2200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d)}
function loader(v){document.getElementById('loader').style.display=v?'flex':'none'}

async function chargerDonnees(){
  loader(true);
  try{
    const rows=await jsonp({action:'get'});
    depenses=(Array.isArray(rows)?rows.slice(1):[]).map(r=>({
      id:String(r[0]),cat:r[1],poste:r[2],note:r[3],
      montant:parseFloat(r[4])||0,date:r[5],
      month:parseInt(r[6]),year:parseInt(r[7]),operateur:r[8]||''
    })).filter(d=>d.cat);
  }catch(e){toast('⚠️ Erreur connexion')}
  loader(false);renderAll();
}

function showPage(p,btn){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(btn)btn.classList.add('active');
  if(p==='recap')renderRecap();
  if(p==='annee')renderAnnee();
  if(p==='glissant')renderGlissant();
  window.scrollTo({top:0,behavior:'smooth'});
}

function changeMonth(d){curMonth+=d;if(curMonth<0){curMonth=11;curYear--}if(curMonth>11){curMonth=0;curYear++}renderHome()}
function changeYear(d){selYear+=d;renderAnnee()}
function toggleCompare(){compareMode=!compareMode;document.getElementById('cmp-btn').classList.toggle('active',compareMode);renderAnnee()}
function showAnneeView(v,btn){anneeView=v;document.querySelectorAll('#page-annee .recap-tab').forEach(t=>t.classList.remove('active'));if(btn)btn.classList.add('active');renderAnneeTable()}
function showRecapView(v,btn){recapView=v;document.querySelectorAll('#page-recap .recap-tab').forEach(t=>t.classList.remove('active'));if(btn)btn.classList.add('active');renderRecap()}

function toggleOpts(){
  optsOpen=!optsOpen;
  document.getElementById('qe-extra').classList.toggle('show',optsOpen);
  document.getElementById('btn-opts').classList.toggle('open',optsOpen);
  document.getElementById('btn-opts').textContent=optsOpen?'− options':'+ options';
}

function initSaisie(){
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('f-date').value=today;
  const[y,m,d]=today.split('-');
  document.getElementById('f-date-display').textContent=`${d}/${m}/${y}`;

  document.getElementById('qe-cats-1').innerHTML=CATS.slice(0,4).map(c=>
    `<div class="qe-cat${c.id===selCat?' active':''}"
      style="${c.id===selCat?'background:'+c.color+';color:#fff':''}"
      onclick="selectCat('${c.id}',this)">
      <span class="qc-icon">${c.icon}</span>${c.label}
    </div>`).join('');

  document.getElementById('qe-cats-2').innerHTML=CATS.slice(4).map(c=>
    `<div class="qe-cat${c.id===selCat?' active':''}"
      style="${c.id===selCat?'background:'+c.color+';color:#fff':''}"
      onclick="selectCat('${c.id}',this)">
      <span class="qc-icon">${c.icon}</span>${c.label}
    </div>`).join('');

  renderPostes();
}

function selectCat(id,el){
  selCat=id;selPoste='';
  document.querySelectorAll('.qe-cat').forEach(p=>{p.classList.remove('active');p.style.background='';p.style.color=''});
  const c=CATS.find(c=>c.id===id);
  el.classList.add('active');el.style.background=c.color;el.style.color='#fff';
  renderPostes();
  document.getElementById('f-montant').focus();
}

function renderPostes(){
  const cat=CATS.find(c=>c.id===selCat);
  const recents=getRecents(selCat);
  const displayed=[...new Set([...recents,...cat.postes])].slice(0,6);
  if(!selPoste||!displayed.includes(selPoste))selPoste=displayed[0]||cat.postes[0];
  document.getElementById('qe-postes').innerHTML=displayed.map(p=>{
    const isR=recents.includes(p),isA=p===selPoste;
    const col=CATS.find(c=>c.id===selCat).color;
    return`<div class="qe-poste-btn${isA?' active':''}${isR?' recent':''}"
      style="${isA?'background:'+col+';color:#fff;border-color:'+col:''}"
      onclick="selectPoste('${p.replace(/'/g,"\\'")}',this)">${p}</div>`;
  }).join('');
}

function selectPoste(p,el){
  selPoste=p;
  document.querySelectorAll('.qe-poste-btn').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.color='';b.style.borderColor=''});
  const col=CATS.find(c=>c.id===selCat).color;
  el.classList.add('active');el.style.background=col;el.style.color='#fff';el.style.borderColor=col;
}

async function addDepense(){
  const montant=parseFloat(document.getElementById('f-montant').value);
  const note=document.getElementById('f-note').value.trim();
  const dateVal=document.getElementById('f-date').value||new Date().toISOString().split('T')[0];
  const poste=selPoste||(CATS.find(c=>c.id===selCat).postes[0]);
  if(!montant||montant<=0){
    document.getElementById('f-montant').style.borderColor='#c0392b';
    document.getElementById('f-montant').focus();
    setTimeout(()=>document.getElementById('f-montant').style.borderColor='',1500);return;
  }
  const parts=dateVal.split('-');
  const entryMonth=parseInt(parts[1])-1,entryYear=parseInt(parts[0]);
  const btn=document.getElementById('btn-valider');btn.disabled=true;btn.textContent='…';
  const id=String(Date.now());
  try{
    await jsonp({action:'add',id,cat:selCat,poste,note,montant,date:dateVal,month:entryMonth,year:entryYear,operateur:'foyer'});
    depenses.push({id,cat:selCat,poste,note,montant,date:dateVal,month:entryMonth,year:entryYear,operateur:'foyer'});
    addRecent(selCat,poste);
    document.getElementById('f-montant').value='';
    document.getElementById('f-note').value='';
    const cat=CATS.find(c=>c.id===selCat);
    toast(`✓ ${cat.icon} ${poste} — ${fmt(montant)}`);
    renderHome();renderPostes();
  }catch(e){toast('⚠️ Erreur enregistrement')}
  btn.disabled=false;btn.textContent='✓ OK';
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement.id==='f-montant')addDepense()});

async function deleteDepense(id){
  try{
    await jsonp({action:'delete',id:String(id)});
    depenses=depenses.filter(d=>d.id!==String(id));
    toast('🗑 Supprimé');renderHome();
  }catch(e){toast('⚠️ Erreur suppression')}
}

function fmt(n){return(n||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'}
function fmtS(n){return(n||0).toLocaleString('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:0})+' €'}
function fmtDate(s){if(!s||s.includes('T'))return'';try{const[y,m,d]=s.split('-');return`${d}/${m}`}catch{return''}}

function getPrevMonth(){
  let m=curMonth-1,y=curYear;
  if(m<0){m=11;y--}
  return{m,y};
}

function renderAll(){initSaisie();renderHome()}

function renderHome(){
  document.getElementById('month-lbl').textContent=MFR[curMonth]+' '+curYear;
  document.getElementById('ck-month-name').textContent=MFR[curMonth]+' '+curYear;

  const md=depenses.filter(d=>d.month===curMonth&&d.year===curYear);
  const mTotal=md.reduce((s,d)=>s+d.montant,0);

  // 12 mois glissants pour moyenne
  const sl=[];for(let i=11;i>=0;i--){let m=curMonth-i,y=curYear;while(m<0){m+=12;y--}sl.push({m,y})}
  const slTotal=depenses.filter(d=>sl.some(s=>s.m===d.month&&s.y===d.year)).reduce((s,d)=>s+d.montant,0);
  const moisActifs=new Set(depenses.filter(d=>sl.some(s=>s.m===d.month&&s.y===d.year)).map(d=>d.year+'-'+d.month)).size;
  const moy=moisActifs>0?slTotal/moisActifs:0;

  // Mois précédent
  const prev=getPrevMonth();
  const prevTotal=depenses.filter(d=>d.month===prev.m&&d.year===prev.y).reduce((s,d)=>s+d.montant,0);

  document.getElementById('ck-mois').textContent=fmtS(mTotal);
  document.getElementById('ck-moy').textContent=fmtS(moy);
  document.getElementById('ck-prev').textContent=fmtS(prevTotal);
  document.getElementById('ck-prev-lbl').textContent=MFR[prev.m].slice(0,4)+'. '+prev.y;

  // Cartes cats
  const maxCat=Math.max(...CATS.map(c=>md.filter(d=>d.cat===c.id).reduce((s,d)=>s+d.montant,0)),1);
  document.getElementById('cat-cards').innerHTML=CATS.map(cat=>{
    const v=md.filter(d=>d.cat===cat.id).reduce((s,d)=>s+d.montant,0);
    const slv=depenses.filter(d=>d.cat===cat.id&&sl.some(s=>s.m===d.month&&s.y===d.year)).reduce((s,d)=>s+d.montant,0);
    const moisActifsCat=new Set(depenses.filter(d=>d.cat===cat.id&&sl.some(s=>s.m===d.month&&s.y===d.year)).map(d=>d.year+'-'+d.month)).size;
    const moyC=moisActifsCat>0?slv/moisActifsCat:0,pct=maxCat>0?Math.round((v/maxCat)*100):0,dif=v-moyC;
    return`<div class="cat-card" style="border-left-color:${cat.color}" onclick="quickSelectCat('${cat.id}')">
      <div class="cc-name" style="color:${cat.color}">${cat.icon} ${cat.label}</div>
      <div class="cc-amount" style="color:${cat.color}">${v>0?fmtS(v):'—'}</div>
      <div class="cc-moy">Moy : ${fmtS(moyC)}/mois</div>
      <div class="cc-bar"><div class="cc-bar-fill" style="width:${pct}%;background:${cat.color}88"></div></div>
      ${v>0?`<div class="cc-state" style="color:${dif>0?'#c0392b':'#27ae60'}">${dif>0?'▲':'▼'} ${fmtS(Math.abs(dif))} vs moy</div>`:''}
    </div>`;
  }).join('');

  // Liste
  const liste=document.getElementById('liste-depenses');liste.innerHTML='';
  CATS.forEach(cat=>{
    const cd=md.filter(d=>d.cat===cat.id);
    if(!cd.length)return;
    const ct=cd.reduce((s,d)=>s+d.montant,0);
    const sec=document.createElement('div');sec.className='dep-section';
    const hdr=document.createElement('div');hdr.className='dep-section-hdr';hdr.style.background=cat.color;
    hdr.innerHTML=`<span>${cat.icon} ${cat.label}</span><span class="hdr-total">${fmt(ct)}</span>`;
    sec.appendChild(hdr);
    cd.forEach(d=>{
      const item=document.createElement('div');item.className='dep-item';
      item.innerHTML=`
        <div class="dep-item-info">
          <div class="dep-item-poste">${d.poste}</div>
          <div class="dep-item-meta">${fmtDate(d.date)}${d.note?' · '+d.note:''}</div>
        </div>
        <div class="dep-item-amount" style="color:${cat.color}">${fmt(d.montant)}</div>
        <button class="dep-item-del" onclick="deleteDepense('${d.id}')">×</button>`;
      sec.appendChild(item);
    });
    liste.appendChild(sec);
  });
}

function quickSelectCat(id){
  selCat=id;selPoste='';
  initSaisie();
  document.getElementById('f-montant').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}

function getMonths(){
  const s=new Set();
  depenses.forEach(d=>s.add(d.year+'-'+String(d.month).padStart(2,'0')));
  for(let i=11;i>=0;i--){let m=curMonth-i,y=curYear;while(m<0){m+=12;y--}s.add(y+'-'+String(m).padStart(2,'0'))}
  return[...s].sort();
}

function renderRecap(){
  const months=getMonths(),cYM=curYear+'-'+String(curMonth).padStart(2,'0');
  const sum=(ci,po,ym)=>{const[y,m]=ym.split('-').map(Number);return depenses.filter(d=>d.cat===ci&&(!po||d.poste===po)&&d.month===m&&d.year===y).reduce((s,d)=>s+d.montant,0)};
  const mTot=ym=>{const[y,m]=ym.split('-').map(Number);return depenses.filter(d=>d.month===m&&d.year===y).reduce((s,d)=>s+d.montant,0)};
  let h='<table><thead><tr><th>Poste</th>';
  months.forEach(ym=>{const[y,m]=ym.split('-').map(Number);const a=ym===cYM;h+=`<th style="${a?'background:var(--accent)':''}">${MS[m]}<br><span style="font-size:9px;opacity:.7">${y}</span></th>`});
  h+='<th style="background:#4a4a4a">Cumul</th></tr></thead><tbody>';
  CATS.forEach(cat=>{
    if(recapView==='cats'){
      let rs=0;h+=`<tr class="cat-row"><td style="background:${cat.color}">${cat.icon} ${cat.label}</td>`;
      months.forEach(ym=>{const v=sum(cat.id,null,ym);rs+=v;const a=ym===cYM;h+=`<td class="${a?'cur':''} ${v===0?'zero':''}">${v===0?'—':fmtS(v)}</td>`});
      h+=`<td style="font-weight:700;color:${cat.color}">${fmtS(rs)}</td></tr>`;
    }else{
      h+=`<tr class="cat-row"><td colspan="${months.length+2}" style="background:${cat.color}">${cat.icon} ${cat.label}</td></tr>`;
      cat.postes.forEach(poste=>{
        let rs=0,has=false;
        const cells=months.map(ym=>{const v=sum(cat.id,poste,ym);rs+=v;if(v>0)has=true;return{v,ym}});
        if(!has)return;
        h+=`<tr><td style="padding-left:16px;font-size:11px">${poste}</td>`;
        cells.forEach(({v,ym})=>{const a=ym===cYM;h+=`<td class="${a?'cur':''} ${v===0?'zero':''}">${v===0?'—':fmtS(v)}</td>`});
        h+=`<td style="font-weight:600">${fmtS(rs)}</td></tr>`;
      });
    }
  });
  h+='<tr class="total-row"><td>💰 TOTAL</td>';
  let ann=0;months.forEach(ym=>{const v=mTot(ym);ann+=v;h+=`<td>${fmtS(v)}</td>`});
  h+=`<td>${fmtS(ann)}</td></tr></tbody></table>`;
  document.getElementById('recap-container').innerHTML=h;
}

const sy=(ci,po,y)=>depenses.filter(d=>d.year===y&&d.cat===ci&&(!po||d.poste===po)).reduce((s,d)=>s+d.montant,0);
const sym=(ci,po,y,m)=>depenses.filter(d=>d.year===y&&d.month===m&&d.cat===ci&&(!po||d.poste===po)).reduce((s,d)=>s+d.montant,0);
const ty=y=>depenses.filter(d=>d.year===y).reduce((s,d)=>s+d.montant,0);
function diff(n,p){if(!p)return'';const d=n-p,pct=Math.round((d/p)*100);if(d>0)return`<span class="up">▲${pct}%</span>`;if(d<0)return`<span class="down">▼${Math.abs(pct)}%</span>`;return`<span class="eq">=</span>`}

function renderAnnee(){
  document.getElementById('year-lbl').textContent=selYear;
  const prev=selYear-1,total=ty(selYear),totalP=ty(prev);
  document.getElementById('year-total').textContent=fmt(total);
  const moisActifsAn=new Set(depenses.filter(d=>d.year===selYear).map(d=>d.month)).size||1;
  document.getElementById('year-total-sub').textContent=compareMode?`vs ${prev} : ${diff(total,totalP).replace(/<[^>]+>/g,'')}`:`Moy/mois (sur ${moisActifsAn} mois) : ${fmtS(total/moisActifsAn)}`;
  document.getElementById('year-cards').innerHTML=CATS.map(cat=>{
    const v=sy(cat.id,null,selYear),vp=sy(cat.id,null,prev);
    return`<div class="year-card" style="border-top-color:${cat.color}">
      <div class="yc-cat" style="color:${cat.color}">${cat.icon} ${cat.label}</div>
      <div class="yc-amount" style="color:${cat.color}">${fmtS(v)}</div>
      <div class="yc-moy">Moy/mois : ${fmtS(moisActifsAn>0?v/moisActifsAn:0)}</div>
      ${compareMode&&vp>0?`<div class="yc-cmp">${diff(v,vp)} vs ${prev}<br><span style="color:var(--text3)">${prev} : ${fmtS(vp)}</span></div>`:''}
    </div>`;
  }).join('');
  renderAnneeTable();
}

function renderAnneeTable(){
  const prev=selYear-1;
  let h='<table><thead><tr><th>'+(anneeView==='cats'?'Catégorie':'Poste')+'</th>';
  MS.forEach((m,i)=>{const isc=selYear===curYear&&i===curMonth;h+=`<th style="${isc?'background:var(--accent)':''}">${m}</th>`});
  h+=`<th style="background:#4a4a4a">Total</th>`;
  if(compareMode)h+=`<th style="background:#555">${prev}</th><th style="background:#555">Écart</th>`;
  h+='</tr></thead><tbody>';
  let mT=new Array(12).fill(0),mTP=new Array(12).fill(0);
  CATS.forEach(cat=>{
    if(anneeView==='cats'){
      let rs=0,rsp=0;h+=`<tr class="cat-row"><td style="background:${cat.color}">${cat.icon} ${cat.label}</td>`;
      for(let m=0;m<12;m++){const v=sym(cat.id,null,selYear,m),vp=sym(cat.id,null,prev,m);rs+=v;rsp+=vp;mT[m]+=v;mTP[m]+=vp;const isc=selYear===curYear&&m===curMonth;h+=`<td class="${isc?'cur':''} ${v===0?'zero':''}">${v===0?'—':fmtS(v)}</td>`}
      h+=`<td style="font-weight:700;color:${cat.color}">${fmtS(rs)}</td>`;
      if(compareMode)h+=`<td style="color:var(--text3)">${fmtS(rsp)}</td><td>${diff(rs,rsp)}</td>`;
      h+='</tr>';
    }else{
      h+=`<tr class="cat-row"><td colspan="${compareMode?15:13}" style="background:${cat.color}">${cat.icon} ${cat.label}</td></tr>`;
      cat.postes.forEach(poste=>{
        let rs=0,rsp=0,has=false;const cells=[];
        for(let m=0;m<12;m++){const v=sym(cat.id,poste,selYear,m),vp=sym(cat.id,poste,prev,m);rs+=v;rsp+=vp;mT[m]+=v;mTP[m]+=vp;if(v>0)has=true;cells.push({v,m})}
        if(!has)return;
        h+=`<tr><td style="padding-left:14px;font-size:11px">${poste}</td>`;
        cells.forEach(({v,m})=>{const isc=selYear===curYear&&m===curMonth;h+=`<td class="${isc?'cur':''} ${v===0?'zero':''}">${v===0?'—':fmtS(v)}</td>`});
        h+=`<td style="font-weight:600">${fmtS(rs)}</td>`;
        if(compareMode)h+=`<td style="color:var(--text3)">${fmtS(rsp)}</td><td>${diff(rs,rsp)}</td>`;
        h+='</tr>';
      });
    }
  });
  const tA=mT.reduce((a,b)=>a+b,0),tAP=mTP.reduce((a,b)=>a+b,0);
  h+='<tr class="total-row"><td>💰 TOTAL</td>';
  mT.forEach((v,m)=>{const isc=selYear===curYear&&m===curMonth;h+=`<td class="${isc?'cur':''}">${fmtS(v)}</td>`});
  h+=`<td>${fmtS(tA)}</td>`;
  if(compareMode)h+=`<td>${fmtS(tAP)}</td><td>${diff(tA,tAP)}</td>`;
  h+='</tr></tbody></table>';
  document.getElementById('annee-table').innerHTML=h;
}

function renderGlissant(){
  const sl=[];for(let i=11;i>=0;i--){let m=curMonth-i,y=curYear;while(m<0){m+=12;y--}sl.push({m,y,ym:y+'-'+String(m).padStart(2,'0')})}
  const f=sl[0],l=sl[sl.length-1];
  document.getElementById('glissant-period').textContent=`${MFR[f.m]} ${f.y} → ${MFR[l.m]} ${l.y}`;
  const inSl=d=>sl.some(s=>s.m===d.month&&s.y===d.year);
  const grand=depenses.filter(inSl).reduce((s,d)=>s+d.montant,0);
  const moisActifsGl=new Set(depenses.filter(inSl).map(d=>d.year+'-'+d.month)).size||1;
  document.getElementById('glissant-total').textContent=fmt(grand);
  document.getElementById('glissant-moy-lbl').textContent=`Moyenne mensuelle (sur ${moisActifsGl} mois) : `+fmt(grand/moisActifsGl);
  document.getElementById('glissant-grid').innerHTML=CATS.map(cat=>{
    const total=depenses.filter(d=>d.cat===cat.id&&inSl(d)).reduce((s,d)=>s+d.montant,0);
    return`<div class="glissant-card" style="border-top-color:${cat.color}">
      <div class="card-cat" style="color:${cat.color}">${cat.icon} ${cat.label}</div>
      <div class="card-amount" style="color:${cat.color}">${fmtS(total)}</div>
      <div class="card-sub">sur 12 mois</div>
      <div class="card-moy">Moy/mois : <strong>${fmtS(new Set(depenses.filter(d=>d.cat===cat.id&&inSl(d)).map(d=>d.year+'-'+d.month)).size>0?total/new Set(depenses.filter(d=>d.cat===cat.id&&inSl(d)).map(d=>d.year+'-'+d.month)).size:0)}</strong></div>
    </div>`;
  }).join('');
  let h='<table><thead><tr><th>Catégorie</th>';
  sl.forEach(s=>{h+=`<th>${MS[s.m]}<br><span style="font-size:9px;opacity:.7">${s.y}</span></th>`});
  h+='<th style="background:#4a4a4a">Total</th><th style="background:#4a4a4a">Moy</th></tr></thead><tbody>';
  let mT=new Array(12).fill(0);
  CATS.forEach(cat=>{
    h+=`<tr class="cat-row"><td style="background:${cat.color}">${cat.icon} ${cat.label}</td>`;
    let rs=0;
    sl.forEach((s,si)=>{const v=depenses.filter(d=>d.cat===cat.id&&d.month===s.m&&d.year===s.y).reduce((a,d)=>a+d.montant,0);rs+=v;mT[si]+=v;h+=`<td class="${v===0?'zero':''}">${v===0?'—':fmtS(v)}</td>`});
    const moisActifsCatGl=new Set(depenses.filter(d=>d.cat===cat.id&&inSl(d)).map(d=>d.year+'-'+d.month)).size||1;
    h+=`<td style="font-weight:700;color:${cat.color}">${fmtS(rs)}</td><td style="color:${cat.color}">${fmtS(rs/moisActifsCatGl)}</td></tr>`;
  });
  h+='<tr class="total-row"><td>💰 TOTAL</td>';
  mT.forEach(v=>{h+=`<td>${fmtS(v)}</td>`});
  h+=`<td>${fmtS(grand)}</td><td>${fmtS(grand/moisActifsGl)}</td></tr></tbody></table>`;
  document.getElementById('glissant-table').innerHTML=h;
}

chargerDonnees();
</script>
</body>
</html>
