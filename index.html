<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dépenses Clémence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F3EAE2;--surface:#ffffff;--surface2:#EDE5D8;--border:#D9CFC4;
  --text:#162D49;--text2:#3d4f63;--text3:#8a9aaa;
  --accent:#162D49;--accent-light:#e8edf2;--danger:#c0392b;
  --shadow:0 2px 16px rgba(22,45,73,.08);--shadow-lg:0 6px 28px rgba(22,45,73,.12);
  --r:14px;--r-sm:9px;
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;overscroll-behavior:none;padding-bottom:var(--nav-h)}

.topbar{background:var(--accent);color:#fff;padding:0 18px;display:flex;align-items:center;height:50px;position:sticky;top:0;z-index:100}
.topbar-title{font-family:'Inter',sans-serif;font-size:16px;letter-spacing:1px}
.topbar-title span{color:#A495C3}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--accent);display:flex;align-items:center;justify-content:space-around;z-index:100;border-top:1px solid rgba(255,255,255,.15);padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 20px;border-radius:10px;transition:all .2s;color:rgba(255,255,255,.6)}
.bnav-btn .bnav-icon{font-size:22px;line-height:1}
.bnav-btn .bnav-label{font-size:10px;font-weight:500;letter-spacing:.5px;font-family:'Inter',sans-serif}
.bnav-btn.active{color:#A495C3}
.bnav-btn.active .bnav-icon{transform:scale(1.1)}

.container{max-width:600px;margin:0 auto;padding:14px 14px}

.loader-overlay{position:fixed;inset:0;background:rgba(244,241,236,.95);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.loader-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.cockpit{background:#162D49;border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--shadow-lg);display:grid;grid-template-columns:1fr 1fr 1fr;gap:0}
.ck-main,.ck-stat{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px 10px;border-right:1px solid rgba(255,255,255,.12)}
.ck-stat:last-child,.ck-main:last-child{border-right:none}
.ck-label,.ck-sl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:5px;font-weight:500}
.ck-amount,.ck-sv{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;color:#ffffff;line-height:1}
.ck-month{font-size:11px;color:rgba(255,255,255,.45);margin-top:4px}

.month-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-bar button{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;cursor:pointer;color:var(--accent);font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.month-lbl{font-family:'Inter',sans-serif;font-size:16px;font-weight:600}

.quick-entry{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.qe-cats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.qe-cat{padding:9px 4px;text-align:center;cursor:pointer;transition:all .15s;font-size:10px;font-weight:600;color:var(--text2);border-right:1px solid var(--border);line-height:1.3;background:var(--surface)}
.qe-cat:last-child{border-right:none}
.qe-cat .qc-icon{font-size:16px;display:block;margin-bottom:2px}
.qe-cat.active{color:#fff;font-weight:600}

.qe-body{padding:14px}
.qe-poste-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:5px;font-weight:600}
.qe-postes{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.qe-poste-btn{padding:5px 11px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;white-space:nowrap}
.qe-poste-btn.active{color:#fff;border-color:transparent;font-weight:600}
.qe-poste-btn.recent::before{content:'★ ';font-size:9px;opacity:.7}

.qe-montant-row{display:flex;gap:9px;align-items:center;margin-bottom:9px}
.qe-montant-wrap{flex:1;position:relative}
.qe-montant-wrap input{width:100%;padding:13px 42px 13px 14px;border:2.5px solid #b8b0a4;border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:24px;font-weight:700;color:#1a1610;background:#f8f4ee;outline:none;transition:border-color .2s;-webkit-appearance:none}
.qe-montant-wrap input:focus{border-color:var(--accent);background:#fff}
.qe-montant-wrap .euro{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--text3);font-family:'Cormorant Garamond',serif}
.btn-valider{background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);padding:13px 20px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 3px 12px rgba(193,127,58,.4);transition:all .15s}
.btn-valider:active{background:#a86830;transform:scale(.96)}
.btn-valider:disabled{background:var(--text3);box-shadow:none}

.qe-options-row{display:flex;align-items:center;gap:8px}
.btn-options{background:none;border:1px solid var(--border);border-radius:100px;padding:4px 11px;font-size:11px;color:var(--text3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-options.open{color:var(--accent);border-color:var(--accent)}
.qe-extra{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.qe-extra.show{display:block}
.qe-extra input{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--surface2);outline:none;margin-bottom:7px}
.qe-extra input:last-child{margin-bottom:0}
.qe-extra input:focus{border-color:var(--accent)}

.cat-cards{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.cat-card{background:var(--surface);border-radius:var(--r);padding:12px 13px;box-shadow:var(--shadow);border-left:3px solid;cursor:pointer;transition:transform .15s,box-shadow .15s}
.cat-card:active{transform:scale(.97)}
.cat-card .cc-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.cat-card .cc-amount{font-family:'Inter',sans-serif;font-size:18px;font-weight:700}
.cat-card .cc-moy{font-size:10px;color:var(--text3);margin-top:2px}
.cat-card .cc-bar{height:3px;background:var(--border);border-radius:2px;margin-top:7px;overflow:hidden}
.cat-card .cc-bar-fill{height:100%;border-radius:2px;transition:width .4s}
.cat-card .cc-state{font-size:10px;margin-top:3px;font-weight:500}

.dep-section{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.dep-section-hdr{display:flex;justify-content:space-between;align-items:center;padding:9px 15px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#fff}
.dep-section-hdr .hdr-total{font-size:14px;font-weight:700}
.dep-item{display:flex;align-items:center;padding:9px 15px;border-bottom:1px solid var(--border);gap:9px;transition:background .15s}
.dep-item:last-child{border-bottom:none}
.dep-item:active{background:var(--surface2)}
.dep-item-info{flex:1;min-width:0}
.dep-item-poste{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dep-item-meta{font-size:11px;color:var(--text3);margin-top:1px}
.dep-item-amount{font-weight:700;font-size:14px;white-space:nowrap}
.dep-item-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:4px;border-radius:6px;flex-shrink:0}
.dep-item-del:active{color:var(--danger)}

.section-title{font-family:'Inter',sans-serif;font-size:19px;font-weight:600;margin-bottom:3px}
.section-sub{color:var(--text2);font-size:12px;margin-bottom:16px}
.recap-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.recap-tab{padding:6px 14px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .2s}
.recap-tab.active{background:#162D49;color:var(--accent);border-color:#1a1a1a}
.recap-table{background:#ffffff;border:1px solid var(--border);border-radius:var(--r);overflow:auto;box-shadow:var(--shadow);margin-bottom:14px}
.recap-table table{width:100%;border-collapse:collapse}
.recap-table th{background:#162D49;color:#f4f1ec;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;white-space:nowrap}
.recap-table th:first-child{text-align:left;min-width:150px;position:sticky;left:0;z-index:2}
.recap-table td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border);font-size:12px;white-space:nowrap;color:var(--text)}
.recap-table td:first-child{text-align:left;font-weight:500;position:sticky;left:0;background:#ffffff;z-index:1;border-right:1px solid var(--border);color:var(--text)}
.recap-table tr:hover td{background:#f0e8df}
.recap-table tr:hover td:first-child{background:#f0e8df}
.recap-table .cat-row td{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;color:#fff!important;background:inherit!important}
.recap-table .total-row td{background:#162D49!important;color:#ffffff!important;font-weight:700;font-size:12px}
.zero{color:#8a9aaa!important}
.cur{background:#dde8f5!important;font-weight:600;color:#162D49!important}

.year-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.year-sel{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 13px;box-shadow:var(--shadow)}
.year-sel button{background:none;border:none;cursor:pointer;color:var(--accent);font-size:20px;padding:0 3px}
.year-lbl{font-family:'Inter',sans-serif;font-size:18px;font-weight:700;color:var(--accent);min-width:60px;text-align:center}
.cmp-btn{padding:7px 13px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all .2s;box-shadow:var(--shadow)}
.cmp-btn.active{background:var(--text);color:var(--accent);border-color:var(--text)}

.months-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.month-card{background:var(--surface);border-radius:var(--r);padding:12px 13px;box-shadow:var(--shadow);border:1px solid var(--border);border-left:3px solid var(--accent)}
.month-card.current{border-left-color:var(--accent);background:#ede9ff}
.mc-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.mc-name{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.mc-total{font-family:'Inter',sans-serif;font-size:16px;font-weight:700;color:var(--text)}
.mc-bars{display:flex;gap:2px;height:6px;border-radius:3px;overflow:hidden;background:var(--border)}
.mc-bar{height:100%;transition:width .3s}
.mc-empty{font-size:11px;color:var(--text3);font-style:italic}

.year-cat-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.year-cat-item{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border)}
.year-cat-header{display:flex;align-items:center;padding:13px 15px;cursor:pointer;gap:12px;transition:background .15s}
.year-cat-header:active{background:var(--surface2)}
.yci-icon{font-size:20px;flex-shrink:0}
.yci-info{flex:1;min-width:0}
.yci-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.yci-moy{font-size:11px;color:var(--text3);margin-top:1px}
.yci-right{text-align:right;flex-shrink:0}
.yci-amount{font-family:'Inter',sans-serif;font-size:18px;font-weight:700}
.yci-arrow{font-size:12px;color:var(--text3);margin-top:2px;transition:transform .2s}
.yci-arrow.open{transform:rotate(90deg)}
.year-cat-detail{display:none;border-top:1px solid var(--border);background:var(--surface2)}
.year-cat-detail.open{display:block}
.ycd-poste{display:flex;justify-content:space-between;align-items:center;padding:9px 15px 9px 20px;border-bottom:1px solid var(--border)}
.ycd-poste:last-child{border-bottom:none}
.ycd-poste-name{font-size:13px;font-weight:500;color:var(--text)}
.ycd-months{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.ycd-month-pill{font-size:10px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:2px 7px;color:var(--text2)}
.ycd-poste-total{font-family:'Inter',sans-serif;font-size:15px;font-weight:700;flex-shrink:0;margin-left:10px}
.up{color:#c0392b;font-weight:600}
.down{color:#27ae60;font-weight:600}
.eq{color:var(--text3)}

.grand-total-card *{color:#ffffff!important}
.grand-total-card{background:linear-gradient(135deg,#162D49,#1e4068);color:#ffffff!important;border-radius:var(--r);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-lg);margin-bottom:16px}
.gt-label{font-family:'Inter',sans-serif;font-size:15px}
.gt-amount{font-family:'Inter',sans-serif;font-size:24px;color:var(--accent)}

.toast{position:fixed;bottom:calc(var(--nav-h) + 10px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#f4f1ec;padding:9px 18px;border-radius:100px;font-size:13px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.page{display:none}
.page.active{display:block}
.hidden{display:none!important}
.modal-overlay.hidden{display:none!important}

.releve-item{background:var(--surface);border-radius:var(--r);padding:13px 16px;margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;align-items:center;gap:12px}
.releve-cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.releve-info{flex:1;min-width:0}
.releve-poste{font-weight:600;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.releve-meta{font-size:11px;color:var(--text3);margin-top:2px}
.releve-meta span{background:var(--surface2);border-radius:4px;padding:1px 6px;margin-right:4px}
.releve-amount{font-weight:700;font-size:15px;white-space:nowrap;text-align:right;min-width:70px}
.releve-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:4px;border-radius:6px;flex-shrink:0;transition:color .15s}
.releve-del:active{color:var(--danger)}
.releve-empty{text-align:center;padding:40px 0;color:var(--text3);font-style:italic;font-size:14px}
</style>
</head>
<body>

<div class="loader-overlay" id="loader"><div class="loader-spinner"></div></div>
<div class="toast" id="toast"></div>

<div class="topbar">
  <div class="topbar-title">Clémence <span>·</span> Dépenses</div>
</div>

<div class="container">

<!-- HOME -->
<div class="page active" id="page-home">

  <div class="cockpit">
    <div class="ck-main">
      <div class="ck-label">Ce mois</div>
      <div class="ck-amount" id="ck-mois">—</div>
    </div>
    <div class="ck-stat">
      <div class="ck-sl">Moyenne</div>
      <div class="ck-sv" id="ck-moy">—</div>
    </div>
    <div class="ck-stat">
      <div class="ck-sl" id="ck-prev-lbl">Mois préc.</div>
      <div class="ck-sv" id="ck-prev">—</div>
    </div>
  </div>

  <div class="month-bar">
    <button onclick="changeMonth(-1)">‹</button>
    <div class="month-lbl" id="month-lbl"></div>
    <button onclick="changeMonth(1)">›</button>
  </div>

  <div class="quick-entry">
    <!-- Ligne 1 : 4 cats -->
    <div class="qe-cats" id="qe-cats-1"></div>
    <!-- Ligne 2 : 4 cats suivantes -->
    <div class="qe-cats" id="qe-cats-2"></div>
    <!-- Ligne 3 : 2 cats restantes si besoin -->
    <div class="qe-cats" id="qe-cats-3" style="border-bottom:1px solid var(--border)"></div>
    <div class="qe-body">
      <div class="qe-poste-label" id="qe-poste-label-wrap">Poste</div>
      <div class="qe-postes" id="qe-postes"></div>
      <input type="text" id="f-note" placeholder="Note / commentaire" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Inter',sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;margin-bottom:8px">
      <div style="font-size:11px;color:#8a9aaa;margin-bottom:8px;font-style:italic">💡 Montant négatif = remboursement</div>
      <div class="qe-montant-row">
        <div class="qe-montant-wrap">
          <input type="number" id="f-montant" placeholder="0" step="0.01" inputmode="decimal">
          <span class="euro">€</span>
        </div>
        <button class="btn-valider" id="btn-valider" onclick="addDepense()">✓ OK</button>
      </div>
      <div class="qe-options-row">
        <button class="btn-options" id="btn-opts" onclick="toggleOpts()">📅 Date</button>
        <span style="font-size:11px;color:#8a9aaa" id="f-date-display"></span>
      </div>
      <div class="qe-extra" id="qe-extra">
        <input type="date" id="f-date">
      </div>
    </div>
  </div>

</div>

<!-- ANNÉE -->
<div class="page" id="page-annee">
  <div class="section-title">Année</div>
  <p class="section-sub" id="annee-sub"></p>
  <div class="year-nav">
    <div class="year-sel">
      <button onclick="changeYear(-1)">‹</button>
      <div class="year-lbl" id="year-lbl"></div>
      <button onclick="changeYear(1)">›</button>
    </div>
  </div>
  <div class="grand-total-card" style="margin-bottom:16px">
    <div><div class="gt-label">Total annuel</div><div style="font-size:11px;color:rgba(255,255,255,.7);margin-top:2px" id="year-total-sub"></div></div>
    <div class="gt-amount" id="year-total">0,00 €</div>
  </div>
  <div class="recap-table" id="annee-mois-table"></div>
</div>

<!-- ANNÉE PAR CATÉGORIE -->
<div class="page" id="page-anneecats">
  <div class="section-title">Par catégorie</div>
  <p class="section-sub">Détail annuel · tous les mois</p>
  <div class="year-nav">
    <div class="year-sel">
      <button onclick="changeYearCats(-1)">‹</button>
      <div class="year-lbl" id="yearcats-lbl"></div>
      <button onclick="changeYearCats(1)">›</button>
    </div>
  </div>
  <div class="recap-table" id="anneecats-table"></div>
</div>

<!-- RELEVÉ -->
<div class="page" id="page-releve">
  <div class="section-title">Relevé</div>
  <p class="section-sub" id="releve-sub"></p>
  <div class="month-bar" style="margin-bottom:16px">
    <button onclick="changeReleveMonth(-1)">‹</button>
    <div class="month-lbl" id="releve-month-lbl"></div>
    <button onclick="changeReleveMonth(1)">›</button>
  </div>
  <div id="releve-list"></div>
  <div class="grand-total-card" style="margin-top:16px">
    <div><div class="gt-label">Total du mois</div></div>
    <div class="gt-amount" id="releve-total">0,00 €</div>
  </div>
</div>

<!-- MODAL MODIFICATION -->
<div class="modal-overlay" id="modal-edit" style="display:none;position:fixed;inset:0;background:rgba(22,45,73,.75);align-items:center;justify-content:center;z-index:998;padding:20px">
  <div style="background:#fff;border-radius:16px;padding:24px;width:100%;max-width:380px;box-shadow:0 16px 48px rgba(22,45,73,.25)">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <div style="background:#EDE5D8;border-radius:8px;padding:8px;font-size:18px">✏️</div>
      <div style="font-size:16px;font-weight:700;color:#162D49">Modifier l'opération</div>
    </div>
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#8a9aaa;margin-bottom:6px">Poste</div>
    <input type="text" id="edit-poste" style="width:100%;padding:11px 14px;border:1.5px solid #D9CFC4;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;color:#162D49;background:#faf8f5;outline:none;margin-bottom:14px;font-weight:500">
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#8a9aaa;margin-bottom:6px">Montant (€)</div>
    <input type="number" id="edit-montant" step="0.01" style="width:100%;padding:11px 14px;border:1.5px solid #D9CFC4;border-radius:10px;font-family:'Inter',sans-serif;font-size:20px;color:#162D49;background:#faf8f5;outline:none;margin-bottom:14px;font-weight:700">
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#8a9aaa;margin-bottom:6px">Note</div>
    <input type="text" id="edit-note" placeholder="Note / commentaire…" style="width:100%;padding:11px 14px;border:1.5px solid #D9CFC4;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;color:#162D49;background:#faf8f5;outline:none;margin-bottom:20px">
    <div style="display:flex;gap:10px">
      <button onclick="saveEdit()" style="flex:1;background:#162D49;color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer">✓ Enregistrer</button>
      <button onclick="document.getElementById('modal-edit').style.display='none'" style="flex:1;background:#F3EAE2;color:#162D49;border:none;border-radius:10px;padding:13px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer">Annuler</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="bnav-btn active" onclick="showPage('home',this)">
    <span class="bnav-icon">🏠</span><span class="bnav-label">Accueil</span>
  </button>
  <button class="bnav-btn" onclick="showPage('annee',this)">
    <span class="bnav-icon">📅</span><span class="bnav-label">Année</span>
  </button>
  <button class="bnav-btn" onclick="showPage('anneecats',this)">
    <span class="bnav-icon">📊</span><span class="bnav-label">Par catégorie</span>
  </button>
  <button class="bnav-btn" onclick="showPage('releve',this)">
    <span class="bnav-icon">📋</span><span class="bnav-label">Relevé</span>
  </button>
</nav>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwXjiAc6R48Um3_md1qZOVCNSyFGDpA3kWDjSmoKIbxTOcc5Xa6r7DIcD9_Tdf7rfDE/exec';
const SHEET='Clémence ';

// ─── CATÉGORIES ───────────────────────────────────────────────────────────────

const CATS=[
  {id:'maison',   label:'Maison',    icon:'🏠', color:'#2563a0', postes:['Taxe foncière','Assurance habitation','Entretien général','Réparations','Jardinage','Impôt salaire','Mobilier','Décoration','Outillage','Petit électroménager','Autre']},
  {id:'energie',  label:'Énergie',   icon:'⚡', color:'#0891b2', postes:['Électricité','Eau','Internet / Box','Téléphone mobile','Autre']},
  {id:'alim',     label:'Courses',   icon:'🛒', color:'#059669', postes:['Supermarché','Marché / Primeur','Boulangerie','Restaurant','Autre']},
  {id:'loisir',   label:'Loisirs',   icon:'🎉', color:'#7c3aed', postes:['Cinéma / Concert','Sport / Fitness','Vacances','Livres / Presse','Sorties','Autre']},
  {id:'transport',label:'Transport', icon:'🚗', color:'#162D49', postes:['Carburant','Assurance voiture','Réparation véhicule','Train / Avion','Autre']},
  {id:'sante',    label:'Santé',     icon:'❤️', color:'#be185d', postes:['Médecin','Spécialiste','Pharmacie','Dentiste','Optique','Kiné','Mutuelle','Remboursement','Autre']},
  {id:'divers',   label:'Divers',    icon:'📦', color:'#475569', postes:['Coiffeur','Vêtements','Cosmétiques','Cadeaux']},
  {id:'epargne',  label:'Épargne',   icon:'💰', color:'#d97706', postes:['Poste libre']},
];

const MFR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

let curMonth=new Date().getMonth(),curYear=new Date().getFullYear();
let selYear=new Date().getFullYear(),anneeView='cats';
let selCat='alim',selPoste='';
let depenses=[],cbN=0,optsOpen=false,lastEntry=null;
let releveMonth=new Date().getMonth(),releveYear=new Date().getFullYear();

function getRecents(id){try{return JSON.parse(localStorage.getItem('rec_'+id)||'[]')}catch{return[]}}
function addRecent(id,p){let r=getRecents(id).filter(x=>x!==p);r.unshift(p);localStorage.setItem('rec_'+id,JSON.stringify(r.slice(0,3)))}

function jsonp(p){
  return new Promise((res,rej)=>{
    const cb='cb_'+(++cbN)+'_'+Date.now();
    const t=setTimeout(()=>{delete window[cb];rej()},15000);
    window[cb]=d=>{clearTimeout(t);delete window[cb];res(d)};
    const qs=Object.entries({...p,callback:cb}).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    const s=document.createElement('script');s.src=SCRIPT_URL+'?'+qs;
    s.onerror=()=>{clearTimeout(t);delete window[cb];rej()};
    document.head.appendChild(s);
    setTimeout(()=>{if(s.parentNode)s.parentNode.removeChild(s)},16000);
  });
}

function toast(msg,d=2200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d)}
function loader(v){document.getElementById('loader').style.display=v?'flex':'none'}

async function chargerDonnees(){
  loader(true);
  try{
    const rows=await jsonp({action:'get',sheet:SHEET});
    depenses=(Array.isArray(rows)?rows.slice(1):[]).map(r=>({
      id:String(r[0]),cat:r[1],poste:r[2],note:r[3],
      montant:parseFloat(r[4])||0,date:String(r[5]).split('T')[0],
      month:parseInt(r[6]),year:parseInt(r[7]),operateur:r[8]||''
    })).filter(d=>d.cat&&d.operateur==='clemence');
  }catch(e){toast('⚠️ Erreur connexion')}
  loader(false);
  renderAll();
  const activePage=document.querySelector('.page.active');
  if(activePage){
    const pid=activePage.id;
    if(pid==='page-annee')renderAnnee();
    if(pid==='page-anneecats')renderAnneeCats();
    if(pid==='page-releve')renderReleve();
  }
}

function showPage(p,btn){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(btn)btn.classList.add('active');
  if(p==='annee')renderAnnee();
  if(p==='anneecats')renderAnneeCats();
  if(p==='releve')renderReleve();
  window.scrollTo({top:0,behavior:'smooth'});
}

function changeMonth(d){curMonth+=d;if(curMonth<0){curMonth=11;curYear--}if(curMonth>11){curMonth=0;curYear++}renderHome()}
function changeYear(d){selYear+=d;renderAnnee()}

function toggleOpts(){
  optsOpen=!optsOpen;
  document.getElementById('qe-extra').classList.toggle('show',optsOpen);
  document.getElementById('btn-opts').classList.toggle('open',optsOpen);
  document.getElementById('btn-opts').textContent=optsOpen?'− options':'+ options';
}

function initSaisie(){
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('f-date').value=today;
  const[y,m,d]=today.split('-');
  document.getElementById('f-date-display').textContent=`${d}/${m}/${y}`;

  // Ligne 1 : 4 premières catégories
  document.getElementById('qe-cats-1').innerHTML=CATS.slice(0,4).map(c=>catBtn(c)).join('');
  // Ligne 2 : 4 suivantes
  document.getElementById('qe-cats-2').innerHTML=CATS.slice(4,8).map(c=>catBtn(c)).join('');
  // Ligne 3 : dernière catégorie (Épargne = index 8)
  const reste=CATS.slice(8);
  const l3=document.getElementById('qe-cats-3');
  if(reste.length){
    l3.style.display='grid';
    l3.innerHTML=reste.map(c=>catBtn(c)).join('');
  } else {
    l3.style.display='none';
  }

  renderPostes();
}

function catBtn(c){
  const active=c.id===selCat;
  return`<div class="qe-cat${active?' active':''}"
    style="${active?'background:'+c.color+';color:#fff':''}"
    onclick="selectCat('${c.id}',this)">
    <span class="qc-icon">${c.icon}</span>${c.label}
  </div>`;
}

function selectCat(id,el){
  selCat=id;selPoste='';
  document.querySelectorAll('.qe-cat').forEach(p=>{p.classList.remove('active');p.style.background='';p.style.color=''});
  const c=CATS.find(c=>c.id===id);
  el.classList.add('active');el.style.background=c.color;el.style.color='#fff';
  renderPostes();
  document.getElementById('f-montant').focus();
}

function renderPostes(){
  const cat=CATS.find(c=>c.id===selCat);
  const wrap=document.getElementById('qe-postes');
  const label=document.getElementById('qe-poste-label-wrap');

  label.style.display='';
  wrap.style.display='';

  // Catégorie à poste unique : affiché sélectionné, note libre
  if(cat.postes.length===1){
    selPoste=cat.postes[0];
    const col=cat.color;
    wrap.innerHTML=`<div class="qe-poste-btn active"
      style="background:${col};color:#fff;border-color:${col}">${cat.postes[0]}</div>`;
    return;
  }

  const recents=getRecents(selCat);
  const basePostes=cat.postes.filter(p=>p!=='Autre');
  const displayed=[...new Set([...recents.filter(p=>p!=='Autre'),...basePostes])].slice(0,12);
  if(!displayed.includes('Autre'))displayed.push('Autre');
  if(!selPoste||!displayed.includes(selPoste))selPoste=displayed[0]||cat.postes[0];
  const col=cat.color;
  wrap.innerHTML=displayed.map(p=>{
    const isA=p===selPoste,isR=recents.includes(p);
    return`<div class="qe-poste-btn${isA?' active':''}${isR?' recent':''}"
      style="${isA?'background:'+col+';color:#fff;border-color:'+col:''}"
      onclick="selectPoste('${p.replace(/'/g,"\\'")}',this)">${p}</div>`;
  }).join('');
}

function selectPoste(p,el){
  selPoste=p;
  document.querySelectorAll('.qe-poste-btn').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.color='';b.style.borderColor=''});
  const col=CATS.find(c=>c.id===selCat).color;
  el.classList.add('active');el.style.background=col;el.style.color='#fff';el.style.borderColor=col;
}

async function addDepense(){
  const montant=parseFloat(document.getElementById('f-montant').value);
  const note=document.getElementById('f-note').value.trim();
  const dateVal=document.getElementById('f-date').value||new Date().toISOString().split('T')[0];
  const poste=selPoste||(CATS.find(c=>c.id===selCat).postes[0]);
  if(isNaN(montant)||montant===0){
    document.getElementById('f-montant').style.borderColor='#c0392b';
    document.getElementById('f-montant').focus();
    setTimeout(()=>document.getElementById('f-montant').style.borderColor='',1500);return;
  }
  const parts=dateVal.split('-');
  const entryMonth=parseInt(parts[1])-1,entryYear=parseInt(parts[0]);
  const btn=document.getElementById('btn-valider');btn.disabled=true;btn.textContent='…';
  const id=String(Date.now());
  try{
    await jsonp({action:'add',id,cat:selCat,poste,note,montant,date:dateVal,month:entryMonth,year:entryYear,operateur:'clemence',sheet:SHEET});
    lastEntry={id,cat:selCat,poste,note,montant,date:dateVal,month:entryMonth,year:entryYear,operateur:'clemence'};
    depenses.push(lastEntry);
    addRecent(selCat,poste);
    document.getElementById('f-montant').value='';
    document.getElementById('f-note').value='';
    const cat=CATS.find(c=>c.id===selCat);
    const prefix=montant<0?'↩️ Remboursement':'✓';
    toast(`${prefix} ${cat.icon} ${cat.label} — ${fmt(montant)}`);
    renderHome();renderPostes();
  }catch(e){toast('⚠️ Erreur enregistrement')}
  btn.disabled=false;btn.textContent='✓ OK';
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement.id==='f-montant')addDepense()});

async function deleteDepense(id){
  try{
    await jsonp({action:'delete',id:String(id),sheet:SHEET});
    depenses=depenses.filter(d=>d.id!==String(id));
    toast('🗑 Supprimé');renderHome();
  }catch(e){toast('⚠️ Erreur suppression')}
}

function fmt(n){return(n||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'}
function fmtS(n){return(n||0).toLocaleString('fr-FR',{minimumFractionDigits:0,maximumFractionDigits:0})+' €'}
function fmtDate(s){if(!s||s.includes('T'))return'';try{const[y,m,d]=s.split('-');return`${d}/${m}`}catch{return''}}

function getPrevMonth(){
  let m=curMonth-1,y=curYear;
  if(m<0){m=11;y--}
  return{m,y};
}

function renderAll(){initSaisie();renderHome()}

function renderHome(){
  document.getElementById('month-lbl').textContent=MFR[curMonth]+' '+curYear;
  const md=depenses.filter(d=>d.month===curMonth&&d.year===curYear);
  const mTotal=md.reduce((s,d)=>s+d.montant,0);
  const sl=[];for(let i=11;i>=0;i--){let m=curMonth-i,y=curYear;while(m<0){m+=12;y--}sl.push({m,y})}
  const slTotal=depenses.filter(d=>sl.some(s=>s.m===d.month&&s.y===d.year)).reduce((s,d)=>s+d.montant,0);
  const moisActifs=new Set(depenses.filter(d=>sl.some(s=>s.m===d.month&&s.y===d.year)).map(d=>d.year+'-'+d.month)).size;
  const moy=moisActifs>0?slTotal/moisActifs:0;
  const prev=getPrevMonth();
  const prevTotal=depenses.filter(d=>d.month===prev.m&&d.year===prev.y).reduce((s,d)=>s+d.montant,0);
  document.getElementById('ck-mois').textContent=fmtS(mTotal);
  document.getElementById('ck-moy').textContent=fmtS(moy);
  document.getElementById('ck-prev').textContent=fmtS(prevTotal);
  document.getElementById('ck-prev-lbl').textContent=MFR[prev.m].slice(0,4)+'. '+prev.y;
}

const sy=(ci,po,y)=>depenses.filter(d=>d.year===y&&d.cat===ci&&(!po||d.poste===po)).reduce((s,d)=>s+d.montant,0);
const sym=(ci,po,y,m)=>depenses.filter(d=>d.year===y&&d.month===m&&d.cat===ci&&(!po||d.poste===po)).reduce((s,d)=>s+d.montant,0);
const ty=y=>depenses.filter(d=>d.year===y).reduce((s,d)=>s+d.montant,0);

let selYearCats=new Date().getFullYear();
function changeYearCats(d){selYearCats+=d;renderAnneeCats()}

function renderAnneeCats(){
  document.getElementById('yearcats-lbl').textContent=selYearCats;
  const moisActifs=new Set(depenses.filter(d=>d.year===selYearCats).map(d=>d.month)).size||1;
  let h='<table><thead><tr><th>Catégorie / Poste</th>';
  MS.forEach((m,i)=>{const isc=selYearCats===curYear&&i===curMonth;h+=`<th style="${isc?'background:var(--accent)':''}">${m}</th>`});
  h+='<th style="background:#4a4a4a">Total</th><th style="background:#4a4a4a">Moy</th></tr></thead><tbody>';
  let mT=new Array(12).fill(0);
  CATS.forEach(cat=>{
    let rs=0;
    const rowCells=Array.from({length:12},(_,m)=>{
      const v=sym(cat.id,null,selYearCats,m);rs+=v;mT[m]+=v;
      const isc=selYearCats===curYear&&m===curMonth;
      return`<td class="${isc?'cur':''} ${v===0?'zero':''}">${v===0?'—':fmtS(v)}</td>`;
    }).join('');
    const moisC=new Set(depenses.filter(d=>d.cat===cat.id&&d.year===selYearCats).map(d=>d.month)).size||1;
    h+=`<tr class="cat-row" style="background:${cat.color}"><td style="background:${cat.color}">${cat.icon} ${cat.label}</td>${rowCells}<td style="font-weight:700;color:${cat.color}">${fmtS(rs)}</td><td style="color:${cat.color}">${fmtS(rs/moisC)}</td></tr>`;
    // Postes détail (toujours affiché)
    if(true){
      const postesUtilises=[...new Set(depenses.filter(d=>d.cat===cat.id&&d.year===selYearCats).map(d=>d.poste))];
      postesUtilises.forEach(poste=>{
        let prs=0;
        const pcells=Array.from({length:12},(_,m)=>{
          const v=sym(cat.id,poste,selYearCats,m);prs+=v;
          const isc=selYearCats===curYear&&m===curMonth;
          return`<td class="${isc?'cur':''} ${v===0?'zero':''}">${v===0?'—':fmtS(v)}</td>`;
        }).join('');
        const moisP=new Set(depenses.filter(d=>d.cat===cat.id&&d.poste===poste&&d.year===selYearCats).map(d=>d.month)).size||1;
        h+=`<tr><td style="padding-left:18px;font-size:11px;color:var(--text2)">${poste}</td>${pcells}<td style="font-weight:600">${fmtS(prs)}</td><td style="color:var(--text3)">${fmtS(prs/moisP)}</td></tr>`;
      });
    }
  });
  const tA=mT.reduce((a,b)=>a+b,0);
  h+='<tr class="total-row"><td>💰 TOTAL</td>';
  mT.forEach((v,m)=>{const isc=selYearCats===curYear&&m===curMonth;h+=`<td class="${isc?'cur':''}">${fmtS(v)}</td>`});
  h+=`<td style='color:#fff'>${fmtS(tA)}</td><td style='color:#fff'>${fmtS(tA/moisActifs)}</td></tr></tbody></table>`;
  document.getElementById('anneecats-table').innerHTML=h;
}

function renderAnnee(){
  document.getElementById('year-lbl').textContent=selYear;
  const total=ty(selYear);
  document.getElementById('year-total').textContent=fmt(total);
  const moisActifsAn=new Set(depenses.filter(d=>d.year===selYear).map(d=>d.month)).size||1;
  document.getElementById('year-total-sub').textContent=`Moy/mois (sur ${moisActifsAn} mois) : ${fmtS(total/moisActifsAn)}`;
  document.getElementById('annee-sub').textContent=selYear+' · total par catégorie et par mois';

  const moisAvecData=[...new Set(depenses.filter(d=>d.year===selYear).map(d=>d.month))].sort((a,b)=>a-b);
  if(moisAvecData.length===0){document.getElementById('annee-mois-table').innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-style:italic">Aucune dépense pour '+selYear+'</div>';return;}

  let h='<table><thead><tr><th>Catégorie</th>';
  moisAvecData.forEach(m=>{const isc=selYear===curYear&&m===curMonth;h+=`<th style="${isc?'background:var(--accent)':''}">${MS[m]}</th>`});
  h+='<th style="background:#4a4a4a">Total</th></tr></thead><tbody>';

  let mT={};moisAvecData.forEach(m=>mT[m]=0);let grandTotal=0;

  CATS.forEach(cat=>{
    const v=sy(cat.id,null,selYear);
    if(v===0)return;
    h+=`<tr class="cat-row" style="background:${cat.color}"><td style="background:${cat.color}">${cat.icon} ${cat.label}</td>`;
    moisAvecData.forEach(m=>{
      const mv=sym(cat.id,null,selYear,m);
      mT[m]+=mv;
      const isc=selYear===curYear&&m===curMonth;
      h+=`<td class="${isc?'cur':''} ${mv===0?'zero':''}">${mv===0?'—':fmtS(mv)}</td>`;
    });
    h+=`<td style="font-weight:700;color:${cat.color}">${fmtS(v)}</td></tr>`;
    grandTotal+=v;
  });

  h+='<tr class="total-row"><td>💰 TOTAL</td>';
  moisAvecData.forEach(m=>{const isc=selYear===curYear&&m===curMonth;h+=`<td class="${isc?'cur':''}">${fmtS(mT[m])}</td>`});
  h+=`<td style='color:#fff'>${fmtS(grandTotal)}</td></tr></tbody></table>`;
  document.getElementById('annee-mois-table').innerHTML=h;
}

function changeReleveMonth(d){
  releveMonth+=d;
  if(releveMonth<0){releveMonth=11;releveYear--}
  if(releveMonth>11){releveMonth=0;releveYear++}
  renderReleve();
}

function renderReleve(){
  document.getElementById('releve-month-lbl').textContent=MFR[releveMonth]+' '+releveYear;
  const md=depenses.filter(d=>d.month===releveMonth&&d.year===releveYear)
    .sort((a,b)=>a.date>b.date?1:-1);
  const total=md.reduce((s,d)=>s+d.montant,0);
  document.getElementById('releve-sub').textContent=
    md.length+' opération'+(md.length>1?'s':'')+' · '+MFR[releveMonth]+' '+releveYear;
  document.getElementById('releve-total').textContent=fmt(total);
  const list=document.getElementById('releve-list');
  if(!md.length){list.innerHTML='<div class="releve-empty">Aucune opération ce mois</div>';return;}
  list.innerHTML=md.map(d=>{
    const cat=CATS.find(c=>c.id===d.cat)||{color:'#999',label:'?',icon:'?'};
    const isNeg=d.montant<0;
    const dateStr=fmtDate(d.date)||'';
    return`<div class="releve-item">
      <div class="releve-cat-dot" style="background:${cat.color}"></div>
      <div class="releve-info">
        <div class="releve-poste">${cat.icon} ${d.poste}</div>
        <div class="releve-meta">
          <span style="color:${cat.color};background:${cat.color}18">${cat.label}</span>
          ${dateStr?`<span>${dateStr}</span>`:''}
          ${d.note?`<span>${d.note}</span>`:''}
        </div>
      </div>
      <div class="releve-amount" style="color:${isNeg?'var(--danger)':cat.color}">${fmt(d.montant)}</div>
      <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
        <button class="releve-del" onclick="editReleve('${d.id.replace(/'/g,'')}')" style="font-size:15px;color:var(--text2)" title="Modifier">✏️</button>
        <button class="releve-del" onclick="deleteReleve('${d.id.replace(/'/g,'')}')" style="font-size:18px;color:var(--text3)" title="Supprimer">×</button>
      </div>
    </div>`;
  }).join('');
}

let editId=null;

function editReleve(id){
  const d=depenses.find(x=>x.id===String(id));
  if(!d)return;
  editId=String(id);
  document.getElementById('edit-poste').value=d.poste;
  document.getElementById('edit-montant').value=d.montant;
  document.getElementById('edit-note').value=d.note||'';
  const m=document.getElementById('modal-edit');m.style.display='flex';m.style.alignItems='center';m.style.justifyContent='center';
}

async function saveEdit(){
  const poste=document.getElementById('edit-poste').value.trim();
  const montant=parseFloat(document.getElementById('edit-montant').value);
  const note=document.getElementById('edit-note').value.trim();
  if(!poste||isNaN(montant)||montant===0){toast('Veuillez remplir poste et montant');return;}
  const d=depenses.find(x=>x.id===editId);
  if(!d)return;
  document.getElementById('modal-edit').style.display='none';
  try{
    await jsonp({action:'delete',id:editId,sheet:SHEET});
    const newId=String(Date.now());
    await jsonp({action:'add',id:newId,cat:d.cat,poste,note,montant,date:d.date,month:d.month,year:d.year,operateur:d.operateur,sheet:SHEET});
    depenses=depenses.filter(x=>x.id!==editId);
    depenses.push({...d,id:newId,poste,note,montant});
    toast('✓ Opération modifiée');
    renderReleve();renderHome();
  }catch(e){toast('⚠️ Erreur modification')}
  editId=null;
}

async function deleteReleve(id){
  if(!confirm('Supprimer cette opération ?'))return;
  try{
    await jsonp({action:'delete',id:String(id),sheet:SHEET});
    depenses=depenses.filter(d=>d.id!==String(id));
    toast('🗑 Opération supprimée');
    renderReleve();
    renderHome();
  }catch(e){toast('⚠️ Erreur suppression')}
}

chargerDonnees();
</script>
</body>
